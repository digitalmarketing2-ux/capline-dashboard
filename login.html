<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capline Dashboard — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1923;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a2a3a;
    border: 1px solid #2a3a4a;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    color: #4fc3f7;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo p {
    color: #6b8a9a;
    font-size: 13px;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    color: #8aa8b8;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    background: #0f1923;
    border: 1px solid #2a3a4a;
    border-radius: 8px;
    color: #e0f0ff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #4fc3f7; }
  .error {
    background: rgba(220,53,69,0.15);
    border: 1px solid rgba(220,53,69,0.4);
    color: #ff6b7a;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .error.show { display: block; }
  button {
    width: 100%;
    padding: 13px;
    background: #4fc3f7;
    color: #0f1923;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  button:hover { background: #81d4fa; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Capline Dashboard</h1>
    <p>SEO & Traffic Analytics</p>
  </div>
  <div class="error" id="err">Invalid username or password.</div>
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
  if (location.search.includes('error')) {
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>
